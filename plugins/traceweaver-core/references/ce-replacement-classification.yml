  current_core_with_broad_surface_held unless the Unit 0 checkpoint, Units 1 through
  4 review evidence, generated classifier evidence, or source baseline is reviewed
  and superseded.
- Use this accepted static-readiness evidence as input to plan Unit 5 host-removal
  readiness checking and Unit 6 authority-record handoff.
- Do not remove host CE or claim runtime behavior from this record.
- Keep host CE removal, runtime invocation, clean replacement, enforcing, publication,
  release-ready, package-ready, upstream-ready, and R31 claims held.
