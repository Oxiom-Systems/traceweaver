stale_reset_triggers:
- requirements baseline hash changes.
- plan review evidence changes or is superseded.
- Unit 1A checkpoint evidence changes.
- non-core CE demand evidence adds or removes requested surfaces.
- accepted product exception is added, changed, expires, or is withdrawn.
- TraceWeaver packaged skill surface changes.
- CE upstream source version, commit, tag, or aggregate fingerprint changes.
- host-visible skill surface changes.
next_required_steps:
