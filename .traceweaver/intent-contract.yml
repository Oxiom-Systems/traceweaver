traceweaver_mode: advisory
mode_policy:
  default: advisory
  allowed_values:
    - off
    - advisory
    - enforcing
  off: CE workflow may run without TraceWeaver authority gates; TraceWeaver skills remain manually callable.
  advisory: TraceWeaver gates warn, create gap/change/exception records, and hold unsupported claims without blocking CE execution.
  enforcing: Held until dynamic/runtime validation approves blocking behavior.
  override_rule: This consuming-repo intent contract is the only project-local override point for traceweaver_mode.

authority_rule:
  invariant: >-
    No agent may implement, review, or modify meaningful behavior unless it can
    cite stakeholder intent, an approved requirement or approved exception, a
    verification method, a validation question, and the current baseline version.
  agent_prompt: >-
    You are not the authority. The authority is this Intent Contract and the
    accepted requirements baseline. You may reason, propose, and identify gaps,
    but you may not silently convert your interpretation into implementation
    authority.
  meaningful_behavior_threshold: >-
    Treat changes to skill instructions, workflow routing, installed artifacts,
    validation claims, public docs, release/package claims, source provenance,
    user-visible behavior, or the authority chain itself as meaningful unless an
    approved record says otherwise.
  missing_authority_disposition:
    - gap
    - proposed_requirement
    - change_request
    - approved_exception_candidate
    - accepted_risk_candidate
    - clarification_needed
    - held_claim

