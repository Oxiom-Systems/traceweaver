stakeholder_intent:
  - id: INTENT-TW-001
    source: requirements.md
    summary: Preserve the stakeholder's original intent through agentic planning, implementation, review, and release decisions.
    validation_question: Can a reviewer trace each meaningful behavior change back to what the stakeholder actually wanted?
  - id: INTENT-TW-002
    source: requirements.md
    summary: Prevent agents from silently converting their own assumptions into implementation authority.
    validation_question: When an agent assumes something, is it recorded as a question, proposed requirement, exception, risk, or rejected assumption instead of implemented silently?
  - id: INTENT-TW-003
    source: requirements.md
    summary: Provide a lightweight systems-engineering workflow usable by coding agents without a heavyweight requirements database.
    validation_question: Can a normal repo use file-based TraceWeaver artifacts to control requirements, traceability, evidence, and changes?
  - id: INTENT-TW-004
    source: requirements.md
    summary: Preserve the Compound Engineering workflow while adding TraceWeaver authority controls.
    validation_question: Can users keep CE planning, work, review, and compound workflows while TraceWeaver records authority warnings and held claims?
  - id: INTENT-TW-005
    source: requirements.md
    summary: Ship only claims that have evidence and keep unproven runtime/release claims explicitly held.
    validation_question: Are alpha, static, dynamic, release, upstream, and clean-replacement claims separated in validation records?
  - id: INTENT-TW-006
    source: requirements.md
    summary: Keep public artifacts clean of private provenance, protected source text, and unsupported compliance claims.
    validation_question: Do public docs and plugin files avoid private paths, protected source names, copied source text, and unsupported standards-conformance language?
  - id: INTENT-TW-007
    source: requirements.md
    summary: Provide a standalone TraceWeaver plugin based on the selected Compound Engineering workflow surface, with TraceWeaver authority and traceability as the default control layer.
    validation_question: If a user installs TraceWeaver instead of CE, do the familiar workflow entrypoints route through TraceWeaver intent, authority, traceability, verification, and validation controls rather than raw CE automation?
  - id: INTENT-TW-008
    source: requirements.md
    summary: Repackage the Compound Engineering method with systems-engineering authority so the simple CE steps remain, but each step preserves intent, requirements quality, traceability, verification, validation, and change control.
    validation_question: Can a user move from idea to brainstorm to requirements to plan, work, review, and learning without dark code, duplicate behavior, hidden assumptions, or missing requirements entering the product?

approved_requirements:
  - id: REQ-TW-001
    intent_ids: [INTENT-TW-001, INTENT-TW-002]
    statement: TraceWeaver must define an Intent Contract as the controlled authority baseline for agent work.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Does every agent-facing workflow identify the authority baseline before behavior changes?
    acceptance_criteria:
      - Intent Contract exists and cites accepted baseline ID and hash.
      - Agent-facing workflows cite the Intent Contract before meaningful behavior changes.
  - id: REQ-TW-002
    intent_ids: [INTENT-TW-001, INTENT-TW-002]
    statement: Agents may not implement, review, or modify meaningful behavior unless they cite stakeholder intent, approved authority, verification method, validation question, and current baseline version.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Are unauthorized changes routed to gaps, changes, or exceptions instead of implementation?
    acceptance_criteria:
      - Meaningful task records include authorized_by, intent_served, verification_required, validation_question, and baseline hash.
  - id: REQ-TW-003
    intent_ids: [INTENT-TW-002]
    statement: Agent assumptions must become open questions, proposed requirements, approved exceptions, accepted risks, or rejected assumptions, not implementation authority.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Can reviewers see each assumption's disposition?
    acceptance_criteria:
      - Assumption records have explicit status and disposition.
  - id: REQ-TW-004
    intent_ids: [INTENT-TW-001, INTENT-TW-002]
    statement: Every meaningful task must have an Intent Capsule or equivalent bounded work package.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Does each task carry enough authority context to prevent drift?
    acceptance_criteria:
      - Task capsules cite authorized_by, intent_served, verification_required, validation_question, must_not_change, and open_assumptions.
  - id: REQ-TW-005
    intent_ids: [INTENT-TW-001, INTENT-TW-003]
    statement: TraceWeaver must maintain a controlled chain from stakeholder intent to needs, requirements, authority, implementation, verification, validation, and change control.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Can a reviewer traverse the chain without guessing?
    acceptance_criteria:
      - Trace records preserve the lifecycle chain and expose missing links.
  - id: REQ-TW-006
    intent_ids: [INTENT-TW-001, INTENT-TW-002]
    statement: Meaningful behavior without approved intent, requirement, or exception trace must be classified as dark behavior.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Are untraced behaviors removed, linked, or approved as exceptions?
    acceptance_criteria:
      - Dark behavior is recorded as remove, link, exception candidate, or held claim.
  - id: REQ-TW-007
    intent_ids: [INTENT-TW-001, INTENT-TW-003]
    statement: TraceWeaver must keep verification evidence separate from validation evidence and carry validation questions with tasks.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Does passing tests still leave the stakeholder-value question visible?
    acceptance_criteria:
      - Verification and validation fields are distinct in task capsules and trace records.
  - id: REQ-TW-008
    intent_ids: [INTENT-TW-003]
    statement: The Markdown traceability matrix is the authoritative audit record; diagrams are derived views only.
    authority_status: approved
    verification_method: inspection
    validation_method: operational_evidence
    validation_question: If a diagram and matrix disagree, does the matrix control?
    acceptance_criteria:
      - Matrix records control over generated or Mermaid diagrams.
  - id: REQ-TW-009
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: TraceWeaver Core must target the eleven-skill systems-engineering suite in controlled promotion increments.
    authority_status: approved
    verification_method: inspection
    validation_method: review_evidence
    validation_question: Is the full suite visible without claiming all skills are runtime-ready?
    acceptance_criteria:
      - Non-selected Core skills remain staged or held unless separately scoped.
  - id: REQ-TW-010
    intent_ids: [INTENT-TW-003, INTENT-TW-004]
    statement: requirements-reviewer and systems-engineering-traceability must remain upstream-neutral Core skills and not depend on CE-specific hooks.
    authority_status: approved
    verification_method: inspection
    validation_method: operational_evidence
    validation_question: Can the Core skills be used outside CE?
    acceptance_criteria:
      - Core skill instructions do not require CE commands, prompts, agents, or delegation payloads.
  - id: REQ-TW-011
    intent_ids: [INTENT-TW-001, INTENT-TW-003]
    statement: U6b Unit 2 alpha materialization must include only the selected authority foundation and selected CE-compatible surfaces approved by scope records.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Does the first alpha slice define authority without pulling the full Core suite into runtime scope?
    acceptance_criteria:
      - Runtime materialization stays limited to selected scope and Intent Contract templates.
  - id: REQ-TW-012
    intent_ids: [INTENT-TW-005]
    statement: Runtime scope must stay staged; U6 alpha may include only selected Light v0.1 runtime skills and later selected CE-compatible surfaces until new scope decisions approve more.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Are non-selected Core 11 skills held until separately scoped?
    acceptance_criteria:
      - Package scope records identify included and held skills.
  - id: REQ-TW-013
    intent_ids: [INTENT-TW-004]
    statement: TraceWeaver CE wrappers must invoke Core skills without redefining Core authority, requirements quality, traceability, risk/gap handling, verification, validation, or baseline rules.
    authority_status: approved
    verification_method: inspection
    validation_method: code_review
    validation_question: Can CE adapter code change without changing Core semantics?
    acceptance_criteria:
      - CE wrappers point to Core rules rather than duplicating or changing them.
  - id: REQ-TW-014
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: TraceWeaver must preserve selected CE workflow skill names for compatibility while keeping clean CE replacement claims held until runtime proof exists.
    authority_status: approved
    verification_method: install_smoke
    validation_method: runtime_smoke
    validation_question: Can users keep their CE workflow without TraceWeaver overclaiming replacement?
    acceptance_criteria:
      - CE-compatible names are package-present or explicitly held with degradation behavior.
  - id: REQ-TW-015
    intent_ids: [INTENT-TW-005]
    statement: Plugin README and manifests must describe alpha skill invocation accurately and must not advertise slash commands unless prompt/command files are installed and proven.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Does a user get exactly what the docs say they get after install?
    acceptance_criteria:
      - Public docs match install manifest and runtime surface.
  - id: REQ-TW-016
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: The documented Codex install command for alpha must materialize selected skills using --include-skills.
    authority_status: approved
    verification_method: install_smoke
    validation_method: operational_evidence
    validation_question: Can a developer copy the command and get usable skills?
    acceptance_criteria:
      - Isolated install with README command copies selected skills.
  - id: REQ-TW-017
    intent_ids: [INTENT-TW-005, INTENT-TW-006]
    statement: Unit 2 must resolve CE upstream source pin before vendoring selected CE files or record an accepted local-cache-only limitation that keeps CE vendoring/release claims held.
    authority_status: approved
    verification_method: inspection
    validation_method: review_evidence
    validation_question: Is copied CE content traceable to a source authority or explicitly limited?
    acceptance_criteria:
      - CE source pin or accepted limitation exists before CE vendoring or release claims.
  - id: REQ-TW-018
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: Unit 2 must prove transitive closure for selected CE support files referenced by SKILL.md files under references, scripts, and assets.
    authority_status: approved
    verification_method: static_closure_audit
    validation_method: install_smoke
    validation_question: Can a selected CE skill run without dangling support-file references?
    acceptance_criteria:
      - Closure audit proves all selected CE support files are present and hashed.
  - id: REQ-TW-019
    intent_ids: [INTENT-TW-005]
    statement: U6b-alpha must be limited to package/install/static materialization evidence; runtime invocation and dynamic discovery remain U6b-dynamic or U9 proof.
    authority_status: approved
    verification_method: inspection
    validation_method: review_evidence
    validation_question: Can reviewers distinguish static install evidence from runtime behavior proof?
    acceptance_criteria:
      - Static and dynamic/runtime claims are separated in evidence records.
  - id: REQ-TW-020
    intent_ids: [INTENT-TW-005]
    statement: U7 release-claim records must stay narrow and keep clean CE replacement, dynamic discovery, slash commands, full Core 11 runtime, and release-ready status held unless proven.
    authority_status: approved
    verification_method: inspection
    validation_method: release_review
    validation_question: Do release claims match the evidence actually collected?
    acceptance_criteria:
      - U7 claims approve only proven installable alpha/static/advisory evidence.
  - id: REQ-TW-021
    intent_ids: [INTENT-TW-006]
    statement: Public artifacts must not include private paths, protected source names, raw standards text, copied source material, or unsupported compliance claims.
    authority_status: approved
    verification_method: hygiene_scan
    validation_method: document_review
    validation_question: Could the public repo be shared without leaking private/protected source basis?
    acceptance_criteria:
      - Hygiene scans and document review find no private/protected leakage.
  - id: REQ-TW-023
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: Every completed TraceWeaver task must end with suggested next steps naming the next CE command, TraceWeaver gate, evidence record, or held condition.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can a contributor tell what should happen next without reconstructing validation history?
    acceptance_criteria:
      - Task summaries end with actionable next steps.
  - id: REQ-TW-024
    intent_ids: [INTENT-TW-001, INTENT-TW-002]
    statement: TraceWeaver must classify changes conservatively; authority-chain and user-visible changes are meaningful by default.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can agents avoid authority controls by labeling support or documentation work as non-meaningful?
    acceptance_criteria:
      - Meaningful behavior threshold appears in task and review guidance.
  - id: REQ-TW-025
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: Advisory alpha must support a minimal Intent Capsule for low-risk or documentation-only work without bypassing authority.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can contributors use TraceWeaver without heavyweight process or authority bypass?
    acceptance_criteria:
      - Minimal capsule still cites approved requirement/exception or blocks implementation with a gap/change proposal.
  - id: REQ-TW-026
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: Needs capture and risk/gap/change-control runtime materialization remain future or separately scoped Core batch work unless later selected.
    authority_status: approved
    verification_method: inspection
    validation_method: scope_review
    validation_question: Can U6b Unit 2 proceed without silently expanding into the full Core 11 suite?
    acceptance_criteria:
      - Future skills may appear only as templates or held routing targets in advisory alpha.
  - id: REQ-TW-027
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: U6b Unit 2 must define static advisory policy only; runtime warning/gap-routing behavior remains held for Unit 3/U9 proof.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Can users understand static advisory policy without mistaking it for proven runtime behavior?
    acceptance_criteria:
      - Unit 2 docs say alpha/advisory/static install only.
  - id: REQ-TW-028
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: Unit 2 must materialize selected CE agents or record explicit per-workflow limitations and allowed claim classes.
    authority_status: approved
    verification_method: package_file_list
    validation_method: install_smoke
    validation_question: Can ce-code-review and ce-doc-review compatibility claims be evaluated without guessing whether their agents are present?
    acceptance_criteria:
      - Each affected CE workflow is classified as name_preserved_only, static_wrapper_available, agent_backed_unavailable, or runtime_equivalent_proven.
  - id: REQ-TW-029
    intent_ids: [INTENT-TW-005, INTENT-TW-006]
    statement: Local-cache-only CE source limitations must record provenance, observed version, hashes, claim restrictions, stale reset, close condition, and unproven scope.
    authority_status: approved
    verification_method: inspection
    validation_method: review_evidence
    validation_question: Does the local-cache path preserve provenance discipline instead of weakening the vendoring gate?
    acceptance_criteria:
      - Local-cache limitation cannot authorize release claims without required fields.
  - id: REQ-TW-030
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: TraceWeaver alpha must default to advisory mode through a controlled policy contract.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Do users understand alpha warnings are advisory and evidence-bound rather than proven enforcement?
    acceptance_criteria:
      - Package default exposes traceweaver_mode: advisory and enforcing remains held.
  - id: REQ-TW-031
    intent_ids: [INTENT-TW-001, INTENT-TW-003]
    statement: Unit 2 must materialize the alpha Intent Contract template set and schema under .traceweaver.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Can implementers create authority records without inventing schema decisions during U6b Unit 2?
    acceptance_criteria:
      - Intent Contract, task capsule, trace record, gap, change, and exception templates exist.
  - id: REQ-TW-032
    intent_ids: [INTENT-TW-001, INTENT-TW-003, INTENT-TW-004]
    statement: TraceWeaver alpha must provide a low-friction advisory drift check for plans, reviews, or task capsules.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can users quickly detect requirement/intent drift before full TraceWeaver replacement is proven?
    acceptance_criteria:
      - Drift check returns aligned, warning, gap, held_claim, or clarification_needed without claiming enforcement.
  - id: REQ-TW-033
    intent_ids: [INTENT-TW-001, INTENT-TW-004]
    statement: TraceWeaver-controlled workflow composition must group authority-control steps with relevant CE-compatible workflow stages once wrapper sequencing is implemented and proven.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can users follow the CE loop without losing TraceWeaver authority controls or overclaiming automatic wrappers?
    acceptance_criteria:
      - Alpha docs state that current CE-compatible skills require manual TraceWeaver gate sequencing.
  - id: REQ-TW-034
    intent_ids: [INTENT-TW-004, INTENT-TW-005, INTENT-TW-007]
    statement: The first TraceWeaver-controlled autonomous alpha surface must be a new tw-auto skill. Packaged lfg must be a TraceWeaver compatibility alias that delegates to tw-auto and must not run raw CE autopilot directly.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Can users invoke the familiar lfg name without bypassing TraceWeaver authority controls?
    acceptance_criteria:
      - tw-auto is the controlled-autonomy surface.
      - Packaged lfg delegates to tw-auto.
      - Packaged lfg does not call raw ce-plan, ce-work, ce-code-review, ce-commit, ce-commit-push-pr, or raw CE autopilot directly.
  - id: REQ-TW-035
    intent_ids: [INTENT-TW-001, INTENT-TW-002, INTENT-TW-005]
    statement: TraceWeaver-controlled automation may continue only while authority remains clear and must stop for missing or changed authority, unresolved dark behavior, or human authority decisions.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Does automation stop before turning missing authority into implementation?
    acceptance_criteria:
      - Stop conditions include missing requirements, changed intent, unapproved assumptions, contradictory authority, scope expansion, and unresolved dark behavior.
  - id: REQ-TW-036
    intent_ids: [INTENT-TW-001, INTENT-TW-003]
    statement: tw-auto must not start implementation until traceability-matrix.md exists. If the file is missing in a consuming project, alpha must create a bootstrap matrix from accepted requirements.md and .traceweaver/intent-contract.yml, record the bootstrap as the first loop action, and run a traceability check before continuing.
    authority_status: approved
    verification_method: inspection
    validation_method: smoke_test
    validation_question: Can controlled automation proceed without silently skipping the matrix?
    acceptance_criteria:
      - Missing matrix bootstrap is the first loop action.
      - A traceability check runs before implementation continues.
  - id: REQ-TW-037
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: The autonomous review-fix loop must be bounded by progress checks and default to at most two review-fix cycles per run unless a reviewed Intent Contract override says otherwise.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can the automation avoid infinite or low-value review/fix loops?
    acceptance_criteria:
      - Stop on cycle limit, no material diff, repeated blocking finding, repeated status without new evidence, or repeated verification failure.
      - Reviewer subagent dispatch queues pending reviewers under host capacity limits, treats active-agent/thread-limit errors as backpressure, closes completed reviewer agents when possible, and reports incomplete reviewer coverage instead of claiming success.
  - id: REQ-TW-038
    intent_ids: [INTENT-TW-001, INTENT-TW-003]
    statement: Behavior-bearing code changes made by controlled automation must link test evidence to the matrix by default, unless an approved requirement or gap/exception authorizes non-test verification.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Do behavior-bearing units trace to tests unless a justified non-test method is approved?
    acceptance_criteria:
      - Matrix rows link tests by default for code behavior changes.
      - Non-test verification records owner, scope, review condition, and next step.
  - id: REQ-TW-039
    intent_ids: [INTENT-TW-002, INTENT-TW-005]
    statement: tw-auto must stop before commit, push, or PR while authority, verification, review, traceability, dark-behavior, stale-evidence, or gap/change/exception write blockers remain.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can automation avoid publishing work that lacks authority, evidence, or clean review state?
    acceptance_criteria:
      - Commit, push, and PR steps are blocked until stop-before-PR conditions are clear.
  - id: REQ-TW-040
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: tw-auto must define review severity policy before running automation.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Are review findings routed consistently during autonomous cycles?
    acceptance_criteria:
      - P0 and P1 always block.
      - P2 blocks when authority, requirements, tests, traceability, validation, release claims, security, data integrity, or runtime safety are affected.
      - P3 may be non-blocking debt only with owner and next step.
  - id: REQ-TW-041
    intent_ids: [INTENT-TW-004, INTENT-TW-007]
    statement: TraceWeaver must be productized as a standalone plugin based on the selected CE workflow surface, not as a secondary helper that requires users to keep invoking CE directly. Familiar CE-derived automation names that remain installed must either route through TraceWeaver authority controls or be clearly marked as legacy/manual-continuity components that do not close TraceWeaver work.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Does installing TraceWeaver make the TraceWeaver-controlled path the normal path for users?
    acceptance_criteria:
      - Plugin docs present TraceWeaver as the controlled workflow surface.
      - Familiar automation aliases route through TraceWeaver controls or are clearly held/manual.
      - Direct CE-compatible component invocation does not close TraceWeaver authority or traceability gates by itself.
  - id: REQ-TW-042
    intent_ids: [INTENT-TW-001, INTENT-TW-003, INTENT-TW-007]
    statement: A fresh TraceWeaver install must provide an authority bootstrap path before implementation. If requirements.md, traceability-matrix.md, or .traceweaver/intent-contract.yml is missing, tw-auto or a future dedicated initializer must create draft authority artifacts from packaged templates and stop for requirements review before work begins.
    authority_status: approved
    verification_method: inspection
    validation_method: smoke_test
    validation_question: Can a new project start TraceWeaver without manually discovering the authority files or bypassing them?
    acceptance_criteria:
      - Missing requirements.md or Intent Contract triggers bootstrap mode.
      - Bootstrap creates draft requirements, Intent Contract, and matrix artifacts.
      - Bootstrap stops before implementation and recommends requirements review.
  - id: REQ-TW-043
    intent_ids: [INTENT-TW-004, INTENT-TW-005, INTENT-TW-007]
    statement: Direct selected CE-compatible skills may remain packaged as implementation components for alpha continuity, but public docs and default prompts must direct users to tw-auto or TraceWeaver gates for controlled work. Direct CE skill invocation does not by itself satisfy TraceWeaver authority, traceability, verification, or validation closure.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can reviewers distinguish packaged CE building blocks from approved TraceWeaver workflow completion?
    acceptance_criteria:
      - README and plugin README distinguish direct CE-compatible components from TraceWeaver-controlled closure.
      - Default prompt points users to tw-auto or TraceWeaver gates.
      - Held-claim records preserve runtime-equivalence and clean-replacement boundaries.
  - id: REQ-TW-044
    intent_ids: [INTENT-TW-004, INTENT-TW-008]
    statement: TraceWeaver must wrap or repackage the selected CE method steps, not merely install adjacent TraceWeaver skills. The wrapped steps must keep the simple CE flow while injecting systems-engineering checks for intent capture, requirement quality, authority, traceability matrix updates, verification evidence, validation questions, gap/change/exception routing, and next-step handoff.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Does the user get the CE-style workflow with TraceWeaver controls embedded at each handoff instead of having to remember separate gates?
    acceptance_criteria:
      - Wrapped or aliased CE-derived entrypoints identify the TraceWeaver control performed at the same handoff.
      - Docs describe CE skills as implementation components of a TraceWeaver-controlled method.
      - Missing authority routes to gaps, changes, exceptions, risks, clarifications, or held claims.
  - id: REQ-TW-045
    intent_ids: [INTENT-TW-001, INTENT-TW-003, INTENT-TW-008]
    statement: >-
      The idea and brainstorm flow must be able to create or update the first
      controlled authority set: root requirements.md, root
      traceability-matrix.md, .traceweaver/intent-contract.yml, and supporting
      gap/change/exception records. Ideas and brainstorm outputs remain source
      material until reviewed requirements become baseline authority.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Can a new project move from loose idea to controlled baseline without losing the stakeholder intent?
    acceptance_criteria:
      - Fresh-project bootstrap creates draft authority files.
      - Brainstorm output is reviewed before becoming requirement authority.
      - The matrix starts tracing requirements before implementation.
  - id: REQ-TW-046
    intent_ids: [INTENT-TW-001, INTENT-TW-002, INTENT-TW-008]
    statement: TraceWeaver review and traceability checks must flag behavior-bearing code, skill logic, commands, scripts, functions, methods, or classes that lack requirement authority, duplicate existing behavior without authority, implement a logical but uncaptured requirement, or fail to link verification evidence.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Does TraceWeaver prevent useful-looking but unauthorized code from silently becoming product behavior?
    acceptance_criteria:
      - Untraced behavior is classified as dark behavior.
      - Logical but uncaptured behavior becomes a proposed requirement or gap before implementation closure.
      - Duplicate or unnecessary behavior is removed, linked to authority, or explicitly accepted.
  - id: REQ-TW-047
    intent_ids: [INTENT-TW-006, INTENT-TW-008]
    statement: TraceWeaver's systems-engineering guidance may summarize and operationalize IEEE 15288/INCOSE-style principles for requirement quality, verification, validation, lifecycle traceability, and change control, but public artifacts must use original TraceWeaver wording and must not copy protected standards text or overclaim formal conformance.
    authority_status: approved
    verification_method: hygiene_scan
    validation_method: document_review
    validation_question: Can TraceWeaver apply systems-engineering discipline without leaking protected material or claiming certification it has not proven?
    acceptance_criteria:
      - Public guidance uses original wording.
      - Source-basis records preserve provenance without protected text leakage.
      - Compliance/conformance claims remain held unless separately proven.
  - id: REQ-TW-048
    intent_ids: [INTENT-TW-001, INTENT-TW-003, INTENT-TW-008]
    statement: TraceWeaver must provide optional tw-grill intent-deepening after an ideation source and before ce-brainstorm, with bootstrap mode only when no controlled authority artifacts exist and delta/gap mode whenever any controlled authority artifact exists. In delta/gap mode, tw-grill must inventory existing requirements, Intent Contract, traceability matrix, gaps, changes, and exceptions before broad questioning, classify meaningful proposed behavior against authority coverage, focus questions on missing, weak, stale, contradictory, or dark-behavior coverage, and route outputs to source-evidence authority deltas. tw-grill must inspect the repo and existing domain docs instead of asking when answers are discoverable, challenge terminology against CONTEXT.md, CONTEXT-MAP.md, and ADR records when present, provide a recommended answer for each user-facing question, give upstream credit for the grill-with-docs inspiration, and output source evidence only. ce:ideate remains optional external CE context until separately selected for packaging.
    authority_status: approved
    verification_method: inspection
    validation_method: stakeholder_review
    validation_question: Can a selected idea be interrogated at the right depth for its current authority state, preserving stakeholder intent and domain language while identifying authority gaps without turning interview answers into implementation authority?
    acceptance_criteria:
      - tw-grill is packaged as a skill.
      - tw-grill appears after ideation and before brainstorming in workflow docs.
      - tw-grill output is explicitly source evidence only; accepted requirements and approved exceptions remain the only implementation authority.
      - tw-grill chooses bootstrap mode only when no controlled authority set exists.
      - tw-grill chooses delta/gap mode whenever any controlled authority artifact exists.
      - tw-grill inventories existing requirements, Intent Contract, traceability matrix, gaps, changes, and exceptions in delta/gap mode before broad questioning.
      - tw-grill classifies coverage as covered, weak_requirement, missing_intent, missing_requirement, missing_verification, missing_validation, contradiction, changed_intent, or dark_behavior_candidate.
      - tw-grill routes unresolved outputs to proposed requirements, change requests, gap records, exception candidates, accepted-risk candidates, validation questions, or rejected assumptions as source evidence.
      - tw-grill instructs agents to inspect the repo instead of asking when answers are discoverable.
      - tw-grill provides recommended answers for user-facing questions.
      - tw-grill checks existing CONTEXT and ADR records when present.
      - tw-grill includes a skill-local upstream attribution notice.

