    linked_requirement: REQ-TW-031
    reason: Plugin-packaged Intent Contract, authority baseline, task capsule, trace record, gap, change, and exception templates are not yet materialized.
    proposed_disposition: Complete U6b Unit 2 template materialization and install/static evidence.
    owner: Oxiom Systems
    review_gate: U6b Unit 2
    status: open
  - id: GAP-TW-CE-SOURCE-PIN
    linked_intent: INTENT-TW-005
    linked_requirement: REQ-TW-017
    reason: CE upstream source pin or complete local-cache-only limitation is required before CE vendoring or U7 release claims.
    proposed_disposition: Resolve CE source pin or record accepted limitation before copying CE files.
    owner: Oxiom Systems
