  - id: REQ-TW-023
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: Every completed TraceWeaver task must end with suggested next steps naming the next CE command, TraceWeaver gate, evidence record, or held condition.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can a contributor tell what should happen next without reconstructing validation history?
    acceptance_criteria:
      - Task summaries end with actionable next steps.
  - id: REQ-TW-024
    intent_ids: [INTENT-TW-001, INTENT-TW-002]
    statement: TraceWeaver must classify changes conservatively; authority-chain and user-visible changes are meaningful by default.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can agents avoid authority controls by labeling support or documentation work as non-meaningful?
    acceptance_criteria:
      - Meaningful behavior threshold appears in task and review guidance.
  - id: REQ-TW-025
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: Advisory alpha must support a minimal Intent Capsule for low-risk or documentation-only work without bypassing authority.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can contributors use TraceWeaver without heavyweight process or authority bypass?
    acceptance_criteria:
      - Minimal capsule still cites approved requirement/exception or blocks implementation with a gap/change proposal.
  - id: REQ-TW-026
    intent_ids: [INTENT-TW-003, INTENT-TW-005]
    statement: Needs capture and risk/gap/change-control runtime materialization remain future or separately scoped Core batch work unless later selected.
    authority_status: approved
    verification_method: inspection
    validation_method: scope_review
    validation_question: Can U6b Unit 2 proceed without silently expanding into the full Core 11 suite?
    acceptance_criteria:
      - Future skills may appear only as templates or held routing targets in advisory alpha.
  - id: REQ-TW-027
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: U6b Unit 2 must define static advisory policy only; runtime warning/gap-routing behavior remains held for Unit 3/U9 proof.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Can users understand static advisory policy without mistaking it for proven runtime behavior?
    acceptance_criteria:
      - Unit 2 docs say alpha/advisory/static install only.
  - id: REQ-TW-028
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: Unit 2 must materialize selected CE agents or record explicit per-workflow limitations and allowed claim classes.
    authority_status: approved
    verification_method: package_file_list
    validation_method: install_smoke
    validation_question: Can ce-code-review and ce-doc-review compatibility claims be evaluated without guessing whether their agents are present?
    acceptance_criteria:
      - Each affected CE workflow is classified as name_preserved_only, static_wrapper_available, agent_backed_unavailable, or runtime_equivalent_proven.
  - id: REQ-TW-029
    intent_ids: [INTENT-TW-005, INTENT-TW-006]
    statement: Local-cache-only CE source limitations must record provenance, observed version, hashes, claim restrictions, stale reset, close condition, and unproven scope.
    authority_status: approved
    verification_method: inspection
    validation_method: review_evidence
    validation_question: Does the local-cache path preserve provenance discipline instead of weakening the vendoring gate?
    acceptance_criteria:
      - Local-cache limitation cannot authorize release claims without required fields.
  - id: REQ-TW-030
    intent_ids: [INTENT-TW-004, INTENT-TW-005]
    statement: TraceWeaver alpha must default to advisory mode through a controlled policy contract.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Do users understand alpha warnings are advisory and evidence-bound rather than proven enforcement?
    acceptance_criteria:
      - Package default exposes traceweaver_mode: advisory and enforcing remains held.
  - id: REQ-TW-031
    intent_ids: [INTENT-TW-001, INTENT-TW-003]
    statement: Unit 2 must materialize the alpha Intent Contract template set and schema under .traceweaver.
    authority_status: approved
    verification_method: inspection
    validation_method: install_smoke
    validation_question: Can implementers create authority records without inventing schema decisions during U6b Unit 2?
    acceptance_criteria:
      - Intent Contract, task capsule, trace record, gap, change, and exception templates exist.
  - id: REQ-TW-032
    intent_ids: [INTENT-TW-001, INTENT-TW-003, INTENT-TW-004]
    statement: TraceWeaver alpha must provide a low-friction advisory drift check for plans, reviews, or task capsules.
    authority_status: approved
    verification_method: inspection
    validation_method: workflow_review
    validation_question: Can users quickly detect requirement/intent drift before full TraceWeaver replacement is proven?
    acceptance_criteria:
      - Drift check returns aligned, warning, gap, held_claim, or clarification_needed without claiming enforcement.

