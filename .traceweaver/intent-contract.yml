must_not_change:
  - Do not treat ideas, brainstorm notes, review findings, task IDs, inferred requirements, draft requirements, bare risk IDs, or traceability debt as implementation authority by themselves.
  - Do not make enforcing mode the default during alpha.
  - Do not claim clean CE replacement until runtime proof shows CE workflow continuity without the installed CE plugin dependency.
  - Do not advertise slash commands unless prompt or command files are installed and proven.
  - Do not expand the default runtime scope to the full Core 11 suite without a later accepted scope decision.
  - Do not let TraceWeaver CE wrappers redefine Core requirements quality, traceability, verification, validation, risk/gap, or baseline semantics.
  - Do not vendor CE files without upstream source pin or an accepted local-cache-only limitation.
  - Do not include private paths, protected source names, raw standards text, copied source material, or unsupported compliance claims in public artifacts.

blocked_assumptions:
  - id: ASM-TW-001
    statement: Static install evidence proves dynamic runtime discovery or real adapter invocation.
    action: Must remain held for U6b-dynamic or U9 evidence.
  - id: ASM-TW-002
    statement: The current alpha plugin is a clean replacement for the Compound Engineering plugin.
    action: Must remain held until CE-compatible workflow, selected agents or limitations, and runtime proof pass.
  - id: ASM-TW-003
    statement: Installed skills imply slash-command availability.
    action: Must remain held until prompt/command surfaces are installed and proven.
  - id: ASM-TW-004
    statement: Agent interpretation can update the baseline without review.
    action: Must become a gap, proposed requirement, change request, exception candidate, or rejected assumption.
  - id: ASM-TW-005
    statement: Full Core 11 public folder presence means full Core 11 runtime readiness.
    action: Must remain held until each skill has accepted runtime/package evidence.

workflow_controls:
  - stage: idea
    ce_command: none
    traceweaver_control: intent_capture
    rule: Capture stakeholder intent, candidate needs, assumptions, risks, success/failure signals, open decisions, and not-doing boundaries. Ideas are not authority.
    next_step: ideation_source
  - stage: ideate
    ce_command: optional_external_ce_ideate_or_other_ideation_source
    traceweaver_control: candidate_direction_generation
    rule: Generate and rank candidate directions. Ideation output is not implementation authority.
    next_step: ce-brainstorm
    optional_candidate_source_evidence: tw-grill
    candidate_source_rule: tw-grill may be used manually as approved static/advisory source-evidence support for one selected idea, using bootstrap mode only when no controlled authority artifacts exist and delta/gap mode whenever any controlled authority artifact exists; it is not implementation authority and runtime behavior remains held until runtime evidence passes.
  - stage: brainstorm
    ce_command: ce-brainstorm
    traceweaver_control: tw-requirements-review_then_manual_authority_baseline_record
    rule: Convert accepted ideas into reviewed requirements, intent IDs, exceptions, validation questions, and baseline version before planning. The baseline record step is manual/file-based until a packaged initializer skill is materialized.
    next_step: ce-plan
  - stage: plan
    ce_command: ce-plan
    traceweaver_control: tw-authority-gate
    rule: Plan only against approved requirements or approved exceptions. Every meaningful task gets an Intent Capsule.
    next_step: ce-work
  - stage: work
    ce_command: ce-work
    traceweaver_control: tw-traceability-check
    rule: Implement only what the task capsule authorizes. Assumptions become gaps, changes, or clarification records.
    next_step: ce-code-review_or_ce-doc-review
  - stage: review
    ce_command: ce-code-review_or_ce-doc-review
    traceweaver_control: tw-traceability-check_then_manual_verification_validation_record
    rule: Check what changed, what requirement authorized it, what verifies it, and whether it satisfies the stakeholder validation question. Verification/validation recording is manual/file-based until a packaged runtime skill is materialized.
    next_step: ce-compound
  - stage: compound_learning
    ce_command: ce-compound
    traceweaver_control: learning_to_change_control_handoff
    rule: Preserve learning without silently rewriting authority. New learning creates proposed requirements or change records.
    next_step: update_baseline_or_continue_U6b

task_capsule_minimum:
  task_id: required
  baseline_id: REQ-BASELINE-2026-04-30-001
  baseline_hash_sha256: a1734fe2e7a19d619c44041b4609f2300dff624844e8117a8ed163527e2db62c
  authorized_by: approved requirement ID or approved exception ID required for meaningful implementation
  intent_served: at least one INTENT-TW ID
  verification_required: required
  validation_question: required
  must_not_change: required when applicable
  open_assumptions: empty list or explicit assumption records
  next_step: required

drift_check:
  purpose: Fast advisory requirement/intent drift check for plans, reviews, and task capsules.
  inputs:
    - proposed behavior
