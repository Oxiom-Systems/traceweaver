reason: >
  The distilled knowledge base is faithful and IP-clean on the SE concepts it
  covers (V&V separation, traceability chain, baseline control, gap/risk/change
  taxonomy) but omits major upstream and quantitative SE domains: requirements
  elicitation, trade studies, interface specification/ICD control, design
  margins/FMEA, ConOps, measures of effectiveness and performance flow-down, and
  risk quantification. Public framing ("adapts established systems-engineering
  controls") can imply broader coverage than delivered, which is in tension with
  INTENT-TW-005 (ship only supported claims) and INTENT-TW-006 (no unsupported
  SE/compliance positioning). Provenance is also boilerplate: all 11
  source-basis.md files are byte-identical with no per-skill basis.
