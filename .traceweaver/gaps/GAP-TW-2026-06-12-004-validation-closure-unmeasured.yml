  repo's own generated data reports acceptance_missing=66 of 67 requirements.
  Validation questions are authored but effectively never answered; validation
  is perpetually held while verification rituals accumulate. This is the
  inversion of the framework's purpose under INTENT-TW-001 and INTENT-TW-005.
